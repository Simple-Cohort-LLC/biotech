name: Weekly Biotech Scout

on:
  schedule:
    # 13:37 UTC every Monday (~9:37am ET summer / 8:37am ET winter).
    # Deliberately an odd minute, NOT the top of the hour: GitHub delays or
    # silently drops scheduled runs during peak load, and :00 is the most
    # congested slot. An off-peak minute markedly improves on-time firing.
    - cron: "37 13 * * 1"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run without posting to Slack or committing state"
        type: boolean
        default: false
      lookback_days:
        description: "Days to look back"
        default: "8"

# Prevent two runs from racing on the committed database.
concurrency:
  group: biotech-scout
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scout:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scout
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL: ${{ secrets.SLACK_CHANNEL }}
          COMPANIES_HOUSE_API_KEY: ${{ secrets.COMPANIES_HOUSE_API_KEY }}
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
          LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days || '8' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: python -m scout.main --verbose

      - name: Upload PDF artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: biotech-scout-report
          path: out/*.pdf
          if-no-files-found: ignore
          retention-days: 90

      - name: Commit updated state
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "biotech-scout[bot]"
          git config user.email "biotech-scout@users.noreply.github.com"
          git add data/scout.db data/companies.csv
          if git diff --staged --quiet; then
            echo "No state changes to commit"
          else
            git commit -m "chore: update scout state $(date -u +%Y-%m-%d)"
            git push
          fi
